
name: jacoco-reporter
author: Pavan Mudigonda
description: |
  Publishes JaCoCo format Coverage Report in GitHub Actions as a Check Run
  and enforces a Code Coverage Quality Gate.

inputs:

  coverage_results_path:
    description: |
      Path (or comma-separated list of paths) to one or more JaCoCo coverage
      XML files. Multiple paths enable multi-module project support — line
      counters are summed across all files and a combined report is produced.
      Example: "module-a/jacoco.xml, module-b/jacoco.xml"
      Note: coverage percentage is calculated from LINE coverage counters.
      This will differ from JaCoCo HTML reports, which show INSTRUCTION coverage.
    required: true

  github_token:
    description: |
      GITHUB_TOKEN used to authenticate against the GitHub API when
      attaching the coverage report to the Workflow Run.
    required: false
    default: ${{ github.token }}

  ghes_api_endpoint:
    description: |
      GitHub Enterprise Server (GHES) API endpoint URL.
      When set, all API calls are directed to this endpoint instead of
      the default https://api.github.com.
      Example: https://github.example.com/api/v3
    required: false

  coverage_report_name:
    description: |
      Name of the Check Run object attached to the Workflow Run.
      Defaults to `COVERAGE_RESULTS_<yyyyMMdd_hhmmss>`.
    required: false

  coverage_report_title:
    description: |
      Title embedded inside the coverage report itself.
      Defaults to the value of `coverage_report_name`.
    required: false

  minimum_coverage:
    description: |
      Minimum required coverage percentage (integer).
      Used together with `fail_below_threshold`.
    required: false

  fail_below_threshold:
    description: |
      When `true`, the action will fail if coverage is below `minimum_coverage`.
    required: false
    default: 'false'

  skip_check_run:
    description: |
      When `true`, skips publishing the coverage report as a GitHub Check Run.
      Use this when you only want the GitHub Job Summary output.
    required: false
    default: 'false'

  publish_only_summary:
    description: |
      When `true`, publishes only the summary table instead of the full
      file-level report. Useful when the full report exceeds GitHub's
      65 k-character API limit.
      Note: the action will automatically switch to summary mode if the full
      report exceeds the limit, even when this is `false`.
    required: false
    default: 'false'

outputs:

  coverage_percentage:
    description: Coverage percentage as a number (e.g. `85.23`). Based on LINE coverage.

  coveragePercentage:
    description: Coverage percentage as a number — alias for `coverage_percentage`

  coveragePercentageString:
    description: Coverage percentage as a formatted string (e.g. `85.23 %`)

  covered_lines:
    description: Number of lines covered by tests

  missed_lines:
    description: Number of lines not covered by tests

  total_lines:
    description: Total number of instrumented lines

  coverageSummary:
    description: |
      Full markdown content of the generated coverage report.
      Useful for embedding in PR comments or custom job summary steps.

branding:
  color: purple
  icon: check-circle

runs:
  using: node24
  main: _init/index.js
